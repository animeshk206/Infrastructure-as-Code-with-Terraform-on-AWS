name: "Terraform Managed Actions"

on:
  workflow_dispatch:
    inputs:
      terraform_action:
        description: 'Select the Terraform Action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

jobs:
  terraform:
    name: "Terraform ${{ github.event.inputs.terraform_action }}"
    runs-on: ubuntu-latest
    environment: development 

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_engine_name: ${{ vars.ENGINE_NAME }}
      TF_VAR_engine_version: ${{ vars.ENGINE_VERSION }}
      TF_VAR_instance_type: ${{ vars.INSTANCE_TYPE }}
      TF_VAR_database_name: ${{ vars.DATABASE_NAME }}
      TF_VAR_username: ${{ vars.DB_USERNAME }}
      AWS_REGION: "ap-south-1"

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3

      - name: "Terraform Init"
        run: terraform init

      # 1. RUN PLAN
      - name: "Terraform Plan"
        if: github.event.inputs.terraform_action == 'plan'
        run: terraform plan

      # 2. RUN APPLY
      - name: "Terraform Apply"
        if: github.event.inputs.terraform_action == 'apply'
        run: terraform apply -auto-approve

      # 3. RUN DESTROY
      - name: "Terraform Destroy"
        if: github.event.inputs.terraform_action == 'destroy'
        run: terraform destroy -auto-approve
